<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toke QR</title>

  <style>
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .pantalla {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #6f63d9 0%, transparent 30%),
        radial-gradient(circle at bottom right, #4f43b8 0%, transparent 25%),
        linear-gradient(135deg, #241a63 0%, #392b95 45%, #574bb4 100%);
      padding: 24px 16px;
    }

    .logo {
      width: 180px;
      max-width: 75%;
      height: auto;
      margin-bottom: 18px;
    }

    .contenedor {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 30px 20px;
      box-shadow: 0 20px 60px rgba(19, 12, 58, 0.30);
      backdrop-filter: blur(6px);
    }

    .titulo {
      font-size: 1.35rem;
      font-weight: 700;
      color: #2d236f;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitulo {
      font-size: 0.95rem;
      color: #6c63a8;
      text-align: center;
      margin-bottom: 24px;
    }

    .botones {
      width: 100%;
      min-height: 64px;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(90deg, #2f227d 0%, #4638a8 50%, #6558d7 100%);
      box-shadow: 0 10px 24px rgba(69, 55, 168, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      cursor: pointer;
    }

    .botones:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(69, 55, 168, 0.35);
    }

    .botones:active {
      transform: scale(0.98);
    }

    .iconos {
      width: 20px;
      height: 20px;
      fill: white;
      flex-shrink: 0;
    }

    .texto {
      color: white;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .resultado {
      color: rgba(255, 255, 255, 0.95);
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      margin-top: 18px;
      padding: 0 12px;
      word-break: break-word;
    }

    .grupo-botones {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @media (max-width: 576px) {
      .pantalla {
        padding: 18px 14px;
      }

      .logo {
        width: 150px;
      }

      .contenedor {
        max-width: 100%;
        padding: 24px 16px;
        border-radius: 24px;
      }

      .titulo {
        font-size: 1.2rem;
      }

      .subtitulo {
        font-size: 0.9rem;
        margin-bottom: 20px;
      }

      .botones {
        min-height: 58px;
        padding: 12px 16px;
      }

      .texto {
        font-size: 0.96rem;
      }
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="pantalla w-100 d-flex flex-column justify-content-center align-items-center">
    
    <img class="logo" src="assets/Logotipo.svg" alt="Logotipo">

    <div class="contenedor">
      <div class="titulo">Selecciona una opción</div>
      <div class="subtitulo">Accede rápidamente a la app que deseas abrir</div>

      <div class="grupo-botones">
        <button class="botones" data-ruta="https://toke.sng.link/Eaumb/r9yl/kqi4?_dl=cobroQR&_smtype=3">
          <svg class="iconos" viewBox="0 0 256 512">
            <path d="M249.3 235.8c10.2 12.6 9.5 31.1-2.2 42.8l-128 128c-9.2 9.2-22.9 11.9-34.9 6.9S64.5 396.9 64.5 384l0-256c0-12.9 7.8-24.6 19.8-29.6s25.7-2.2 34.9 6.9l128 128 2.2 2.4z"/>
          </svg>
          <span class="texto">Ir a TOKE</span>
        </button>

        <button class="botones" data-ruta="https://toke.sng.link/Eaumb/r9yl/kqi4?_dl=cobroQR&_smtype=3">
          <svg class="iconos" viewBox="0 0 256 512">
            <path d="M249.3 235.8c10.2 12.6 9.5 31.1-2.2 42.8l-128 128c-9.2 9.2-22.9 11.9-34.9 6.9S64.5 396.9 64.5 384l0-256c0-12.9 7.8-24.6 19.8-29.6s25.7-2.2 34.9 6.9l128 128 2.2 2.4z"/>
          </svg>
          <span class="texto">Ir a Popular</span>
        </button>

        <button class="botones" data-ruta="https://toke.sng.link/Eaumb/r9yl/kqi4?_dl=cobroQR&_smtype=3">
          <svg class="iconos" viewBox="0 0 256 512" >
            <path d="M249.3 235.8c10.2 12.6 9.5 31.1-2.2 42.8l-128 128c-9.2 9.2-22.9 11.9-34.9 6.9S64.5 396.9 64.5 384l0-256c0-12.9 7.8-24.6 19.8-29.6s25.7-2.2 34.9 6.9l128 128 2.2 2.4z"/>
          </svg>
          <span class="texto">Ir a Gnial</span>
        </button>
      </div>
    </div>
<p class="texto mt-2">Design by RB_Developer ❤️</p>
  </div>

  <script>
  const params = new URLSearchParams(window.location.search);
  const valor = params.get("_p");

  const botones = document.querySelectorAll(".botones");

  botones.forEach(boton => {
    boton.addEventListener("click", () => {
      const rutaBase = boton.getAttribute("data-ruta");

      if (valor) {
        window.location.href = `${rutaBase}&campaign=${encodeURIComponent(valor)}`;
      } else {
        window.location.href = rutaBase;
      }
    });
  });
</script>
</body>
</html>
